apiVersion: v1
kind: Service
metadata:
  name: qdrant-service
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: qdrant
  ports:
    - name: http
      protocol: TCP
      port: 6333
      targetPort: 6333
    - name: grpc
      protocol: TCP
      port: 6334
      targetPort: 6334
