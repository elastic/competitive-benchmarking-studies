services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ES_VERSION}
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms${ES_HEAP:-4g} -Xmx${ES_HEAP:-4g}"
    volumes:
      - esdata01:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    deploy:
      resources:
        limits:
          memory: ${CONTAINER_MEMORY_LIMIT:-12g}
          cpus: '${CONTAINER_CPU_LIMIT:-12}'

  prometheus:
    image: prom/prometheus:v${PROMETHEUS_VERSION}
    user: "${UID}:${GID}"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-otlp-receiver"
      - "--storage.tsdb.retention.time=2d"
      - "--web.enable-admin-api"
      #- "--enable-feature=otlp-deltatocumulative"
    volumes:
      - ../config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../../data/prometheus:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    deploy:
      resources:
        limits:
          memory: ${CONTAINER_MEMORY_LIMIT:-12g}
          cpus: '${CONTAINER_CPU_LIMIT:-12}'

  mimir:
    image: grafana/mimir:${MIMIR_VERSION}
    user: "${UID}:${GID}"
    working_dir: /tmp/mimir-data
    command:
      - "--config.file=/etc/mimir/mimir.yaml"
    volumes:
      - ../config/mimir.yaml:/etc/mimir/mimir.yaml:ro
      - ../../data/mimir:/tmp/mimir-data
    ports:
      - "8080:8080"
    # No healthcheck: the grafana/mimir image is a distroless-style single
    # binary — confirmed via `docker run --entrypoint sh ...` that there is
    # no shell, wget, or curl at all, so a CMD/CMD-SHELL healthcheck can
    # never succeed here. Readiness is polled externally instead — see the
    # Makefile's `mimir` target (`uv run wait-for`).
    deploy:
      resources:
        limits:
          memory: ${CONTAINER_MEMORY_LIMIT:-12g}
          cpus: '${CONTAINER_CPU_LIMIT:-12}'

  clickhouse:
    image: clickhouse/clickhouse-server:${CLICKHOUSE_VERSION}
    environment:
      # No CLICKHOUSE_USER/CLICKHOUSE_PASSWORD: the image's entrypoint only
      # provisions a password-protected default user when one is set, so
      # leaving these unset keeps the `default` user open (no auth), as
      # configured in users.d.xml.
      - CLICKHOUSE_DB=${CLICKHOUSE_DATABASE:-default}
    volumes:
      - ../config/clickhouse/config.d.xml:/etc/clickhouse-server/config.d/benchbuilder.xml:ro
      - ../config/clickhouse/users.d.xml:/etc/clickhouse-server/users.d/benchbuilder_users.xml:ro
      - clickhousedata01:/var/lib/clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "wget --inet4-only --no-verbose --tries=1 -O - http://localhost:8123/ping | grep 'Ok.'"]
      interval: 10s
      timeout: 5s
      retries: 30
    deploy:
      resources:
        limits:
          memory: ${CONTAINER_MEMORY_LIMIT:-12g}
          cpus: '${CONTAINER_CPU_LIMIT:-12}'

volumes:
  esdata01:
    driver: local
  clickhousedata01:
    driver: local
