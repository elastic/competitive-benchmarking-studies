apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: es-cluster
spec:
  version: "${engineVersion}"
  http:
    service:
      spec:
        type: ClusterIP
  nodeSets:
    - name: default
      count: ${workerCount}
      podTemplate:
        spec:
          nodeSelector:
            cloud.google.com/gke-nodepool: elasticsearch-nodepool
          initContainers:
            - name: sysctl
              securityContext:
                privileged: true
                runAsUser: 0
              command: ["sh", "-c", "sysctl -w vm.max_map_count=262144"]
          containers:
            - name: elasticsearch
              resources:
                requests:
                  memory: "${memoryRequest}"
                  cpu: "${cpuRequest}"
                limits:
                  memory: "${memoryLimit}"
                  cpu: "${cpuLimit}"
      volumeClaimTemplates:
        - metadata:
            name: elasticsearch-data
          spec:
            accessModes:
              - ReadWriteOnce
            storageClassName: "${storageClassName}"
            resources:
              requests:
                storage: "${storageSize}"
