global:
  scrape_interval: 15s
  evaluation_interval: 15s

storage:
  tsdb:
    out_of_order_time_window: 270m

otlp:
  translation_strategy: NoTranslation

# No scrape_configs — self-scraping would advance the TSDB head to "now",
# making all historical replay data (start_now_minus=270m) appear out-of-order
# and get rejected at the boundary. Without self-scraping, the TSDB head starts
# empty and metricsgenreceiver's data is accepted as in-order.
